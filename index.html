
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tabs UI</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">

<div class="max-w-xl mx-auto bg-white rounded-lg shadow-md">
	<!-- Tabs Header -->
	<div class="flex border-b border-gray-200">
		<button class="tab-btn px-4 py-2 text-gray-600 font-medium border-b-2 border-transparent focus:outline-none active" data-tab="tab1">Tab 1</button>
		<button class="tab-btn px-4 py-2 text-gray-600 font-medium border-b-2 border-transparent focus:outline-none" data-tab="tab2">Tab 2</button>
		<button class="tab-btn px-4 py-2 text-gray-600 font-medium border-b-2 border-transparent focus:outline-none" data-tab="tab3">Tab 3</button>
	</div>
 	<!-- Tabs Content -->
 	<div class="p-4">
 		<div id="tab1" class="tab-content">
 		<h2 class="text-xl font-semibold mb-2">Tab 1 Content</h2>
        <p>This is the content for Tab 1. You can put anything here, like text, images, or forms.</p>
 		</div>
 		 <div id="tab2" class="tab-content hidden">
        <h2 class="text-xl font-semibold mb-2">Tab 2 Content</h2>
        <p>This is the content for Tab 2. Add your own information or components here.</p>
      </div>
      <div id="tab3" class="tab-content hidden">
        <h2 class="text-xl font-semibold mb-2">Tab 3 Content</h2>
        <p>This is the content for Tab 3. Perfect for showing multiple sections in the same area.</p>
      </div>	
 	</div>
</div>

<script src="script.js"></script>
</body>
</html>
